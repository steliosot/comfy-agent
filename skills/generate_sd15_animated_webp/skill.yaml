name: generate_sd15_animated_webp
description: Generate a simple animated WEBP from an SD1.5 image batch.

inputs:
  prompt:
    type: string
    default: "stylized robot walking through neon rain"
  negative_prompt:
    type: string
    default: "watermark, text, blurry, low quality, extra limbs"
  width:
    type: integer
    default: 512
  height:
    type: integer
    default: 512
  batch_size:
    type: integer
    default: 8
  steps:
    type: integer
    default: 20
  fps:
    type: integer
    default: 6
  seed:
    type: integer
    default: 20260317

outputs:
  animation: string
