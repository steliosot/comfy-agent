name: preview_sd15_fast_character
description: Preview a fast SD1.5 character concept image.

inputs:
  prompt:
    type: string
    default: "stylized explorer character"
  negative_prompt:
    type: string
    default: "watermark, text, blurry, duplicate limbs, low quality"
  steps:
    type: integer
    default: 12
  seed:
    type: integer
    default: 192837465

outputs:
  preview: string
