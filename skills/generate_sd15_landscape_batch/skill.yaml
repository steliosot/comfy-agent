name: generate_sd15_landscape_batch
description: Generate a batch of SD1.5 landscape images.

inputs:
  prompt:
    type: string
    default: "epic mountain valley at sunrise"
  negative_prompt:
    type: string
    default: "watermark, text, low quality, blurry, oversaturated"
  width:
    type: integer
    default: 768
  height:
    type: integer
    default: 512
  batch_size:
    type: integer
    default: 3
  steps:
    type: integer
    default: 30
  seed:
    type: integer
    default: 440912775103002

outputs:
  image: string
