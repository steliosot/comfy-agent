name: preview_sd15_img2img
description: Preview an SD1.5 img2img result from an input image.

inputs:
  image:
    type: string
    default: "preview_source.png"
  prompt:
    type: string
    default: "stylized concept art repaint"
  negative_prompt:
    type: string
    default: "watermark, text, blurry, muddy colors, extra limbs"
  steps:
    type: integer
    default: 12
  denoise:
    type: float
    default: 0.4
  seed:
    type: integer
    default: 1122334455

outputs:
  preview: string
