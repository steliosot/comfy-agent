name: generate_ltxv_img2video

description: Generate an LTXV image-to-video clip from a pre-uploaded Comfy input image.

inputs:
  image:
    type: string
    description: Comfy input filename from upload_image.
  image_source:
    type: string
    required: false
    description: "'input' (default) or 'output' to transfer from Comfy output to input automatically."
  image_subfolder:
    type: string
    required: false
    description: Subfolder for output image when image_source='output'.
  image_type:
    type: string
    required: false
    description: Comfy type for output image when image_source='output' (default 'output').
  prompt:
    type: string
  negative_prompt:
    type: string
  run_id:
    type: string
    required: false
  filename_prefix:
    type: string
    required: false

outputs:
  status:
    type: string
  run_id:
    type: string
  prompt_id:
    type: string
  filename_prefix:
    type: string
  output_items:
    type: array
  artifacts:
    type: array
