    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
