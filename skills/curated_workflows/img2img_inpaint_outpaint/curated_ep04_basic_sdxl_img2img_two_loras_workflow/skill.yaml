name: curated_ep04_basic_sdxl_img2img_two_loras_workflow
description: Curated workflow wrapper for EP04 Basic SDXL IMG2IMG TWO LORAS Workflow.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: checkpoint
    name: Juggernaut_X_RunDiffusion.safetensors
    target_folder: models/checkpoints
  - type: lora
    name: Aether_Cloud_v1.safetensors
    target_folder: models/loras
  - type: lora
    name: Aether_Fire_v1_SDXL_LoRA.safetensors
    target_folder: models/loras
  custom_nodes: []
  links: []
  input_modalities:
  - text_prompt
  output_modalities:
  - image/png
