name: curated_ep29_sdxl_inpaint_replace_complex_background
description: Curated workflow wrapper for EP29 SDXL Inpaint Replace Complex Background.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: controlnet
    name: diffusion_pytorch_model_promax.safetensors
    target_folder: models/controlnet
  - type: checkpoint
    name: juggernautXL_versionXInpaint.safetensors
    target_folder: models/checkpoints
  custom_nodes: []
  links: []
  input_modalities:
  - image
  - text_prompt
  output_modalities:
  - image/png
