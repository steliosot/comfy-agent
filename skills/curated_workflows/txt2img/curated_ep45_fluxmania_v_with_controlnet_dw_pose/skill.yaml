name: curated_ep45_fluxmania_v_with_controlnet_dw_pose
description: Curated workflow wrapper for Ep45 Fluxmania V with ControlNet DW Pose.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: vae
    name: ae.safetensors
    target_folder: models/vae
  - type: controlnet
    name: flux-cn-pro-2.safetensors
    target_folder: models/controlnet
  - type: clip
    name: t5-v1_1-xxl-encoder-Q8_0.gguf
    target_folder: models/clip
  - type: diffusion_model
    name: fluxmania_V.safetensors
    target_folder: models/diffusion_models
  custom_nodes:
  - comfyui-gguf
  - comfyui_controlnet_aux
  - kaytool
  links:
  - https://civitai.com/api/download/models/1539776?type=Model&format=SafeTensor&size=full&fp=fp8
  - https://civitai.com/models/778691/fluxmania?modelVersionId=1539776
  - https://discord.com/invite/gggpkVgBf3
  - https://huggingface.co/Shakker-Labs/FLUX.1-dev-ControlNet-Union-Pro-2.0
  - https://huggingface.co/Shakker-Labs/FLUX.1-dev-ControlNet-Union-Pro-2.0/resolve/main/diffusion_pytorch_model.safetensors?download=true
  - https://huggingface.co/black-forest-labs/FLUX.1-schnell
  - https://huggingface.co/black-forest-labs/FLUX.1-schnell/resolve/main/ae.safetensors?download=true
  - https://huggingface.co/city96/t5-v1_1-xxl-encoder-gguf/resolve/main/t5-v1_1-xxl-encoder-Q8_0.gguf?download=true
  - https://huggingface.co/city96/t5-v1_1-xxl-encoder-gguf/tree/main
  - https://huggingface.co/comfyanonymous/flux_text_encoders/resolve/main/clip_l.safetensors?download=true
  - https://www.youtube.com/@pixaroma
  input_modalities:
  - image
  - text_prompt
  output_modalities:
  - image/png
