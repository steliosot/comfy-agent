name: curated_shuttle_jaguar_nunchaku_txt2img_with_upscaler
description: Curated workflow wrapper for Shuttle Jaguar (Nunchaku) txt2img with Upscaler.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: upscale_model
    name: 4x_NMKD-Siax_200k.pth
    target_folder: models/upscale_models
  - type: vae
    name: ae.safetensors
    target_folder: models/vae
  custom_nodes:
  - ComfyUI-TiledDiffusion
  - ComfyUI-nunchaku
  - comfyui-easy-use
  - controlaltai-nodes
  links:
  - https://discord.com/invite/gggpkVgBf3
  - https://github.com/Tavris1/ComfyUI-Easy-Install/tree/Windows-Nunchaku
  - https://huggingface.co/Akumetsu971/SD_Anime_Futuristic_Armor/resolve/main/4x_NMKD-Siax_200k.pth?download=true
  - https://huggingface.co/Comfy-Org/Lumina_Image_2.0_Repackaged/resolve/main/split_files/vae/ae.safetensors?download=true
  - https://huggingface.co/comfyanonymous/flux_text_encoders/resolve/main/clip_l.safetensors?download=true
  - https://huggingface.co/comfyanonymous/flux_text_encoders/resolve/main/t5xxl_fp8_e4m3fn_scaled.safetensors?download=true
  - https://huggingface.co/comfyanonymous/flux_text_encoders/tree/main
  - https://huggingface.co/mit-han-lab/nunchaku-shuttle-jaguar
  - https://huggingface.co/mit-han-lab/nunchaku-shuttle-jaguar/resolve/main/svdq-fp4_r32-shuttle-jaguar.safetensors?download=true
  - https://huggingface.co/mit-han-lab/nunchaku-shuttle-jaguar/resolve/main/svdq-int4_r32-shuttle-jaguar.safetensors?download=true
  - https://huggingface.co/shuttleai/shuttle-jaguar
  - https://www.youtube.com/@pixaroma
  - https://www.youtube.com/watch?v=eATIu4lkOl0
  input_modalities:
  - text_prompt
  output_modalities:
  - image/png
