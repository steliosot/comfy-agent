name: run_curated_workflow
description: Execute a curated workflow skill by id with optional runtime overrides.

inputs:
  skill_id:
    type: string
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false

outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
