name: curated_netayume_v3_5_txt2img_upscaler
description: Curated workflow wrapper for NetaYume v3.5 txt2img + Upscaler.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: checkpoint
    name: NetaYumev35_pretrained_all_in_one.safetensors
    target_folder: models/checkpoints
  - type: upscale_model
    name: 4xNomos2_hq_dat2.safetensors
    target_folder: models/upscale_models
  custom_nodes:
  - ComfyUI-TiledDiffusion
  - comfyui-easy-use
  - controlaltai-nodes
  - rgthree-comfy
  links:
  - https://discord.com/invite/gggpkVgBf3
  - https://huggingface.co/Phips/4xNomos2_hq_dat2
  - https://huggingface.co/Phips/4xNomos2_hq_dat2/resolve/main/4xNomos2_hq_dat2.safetensors?download=true
  - https://huggingface.co/duongve/NetaYume-Lumina-Image-2.0
  - https://huggingface.co/duongve/NetaYume-Lumina-Image-2.0/resolve/main/NetaYumev35_pretrained_all_in_one.safetensors
  - https://neta-lumina-style.tz03.xyz/
  - https://nieta-art.feishu.cn/wiki/RY3GwpT59icIQlkWXEfcCqIMnQd
  - https://www.youtube.com/@pixaroma
  input_modalities:
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - flux
  - sd3
  - wan
  node_count: 29
  node_types:
  - CLIPTextEncode
  - CheckpointLoaderSimple
  - EmptySD3LatentImage
  - Fast Groups Muter (rgthree)
  - FluxResolutionNode
  - Image Comparer (rgthree)
  - ImageScaleBy
  - ImageUpscaleWithModel
  - KSampler
  - Label (rgthree)
  - MarkdownNote
  - ModelSamplingAuraFlow
  - PreviewAny
  - SaveImage
  - StringConcatenate
  - TiledDiffusion
  - UpscaleModelLoader
  - VAEDecode
  - VAEEncode
  - easy cleanGpuUsed
selection_metadata:
  family: upscaling
  resource_profile: medium
  complexity_score: 4
  estimated_runtime: moderate (about 30-120s depending on server)
  warnings:
  - Medium-high resolution detected; expect moderate extra runtime.
  - Multiple custom nodes required; verify node installation/version compatibility.
  max_width: 1024
  max_height: 1024
  max_steps: 30
