name: workflow_ep46_juggernaut_reborn_sd1_5_txt2img_with_upscaler
description: Workflow wrapper for EP46 Juggernaut Reborn SD1.5 TXT2IMG with Upscaler.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: upscale_model
    name: 4x_NMKD-Siax_200k.pth
    target_folder: models/upscale_models
  - type: checkpoint
    name: juggernaut_reborn.safetensors
    target_folder: models/checkpoints
  custom_nodes:
  - ComfyUI-TiledDiffusion
  - comfyui-easy-use
  - controlaltai-nodes
  links:
  - https://civitai.com/api/download/models/274039?type=Model&format=SafeTensor&size=pruned&fp=fp16
  - https://civitai.com/models/46422?modelVersionId=274039
  - https://discord.com/invite/gggpkVgBf3
  - https://huggingface.co/Akumetsu971/SD_Anime_Futuristic_Armor/resolve/main/4x_NMKD-Siax_200k.pth?download=true
  - https://www.youtube.com/@pixaroma
  input_modalities:
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - flux
  - sd3
  - wan
  node_count: 29
  node_types:
  - CLIPTextEncode
  - CheckpointLoaderSimple
  - EmptySD3LatentImage
  - Fast Groups Muter (rgthree)
  - FluxResolutionNode
  - ImageScaleBy
  - ImageUpscaleWithModel
  - KSampler
  - Label (rgthree)
  - MarkdownNote
  - SaveImage
  - TiledDiffusion
  - UpscaleModelLoader
  - VAEDecode
  - VAEEncode
  - easy cleanGpuUsed
  - easy showAnything
selection_metadata:
  family: upscaling
  resource_profile: medium
  complexity_score: 3
  estimated_runtime: moderate (about 30-120s depending on server)
  warnings:
  - Medium-high resolution detected; expect moderate extra runtime.
  - Uses custom nodes; missing nodes can cause validation/runtime failures.
  max_width: 1024
  max_height: 1024
  max_steps: 30
