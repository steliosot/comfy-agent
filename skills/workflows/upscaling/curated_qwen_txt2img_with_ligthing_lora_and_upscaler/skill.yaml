name: curated_qwen_txt2img_with_ligthing_lora_and_upscaler
description: Curated workflow wrapper for Qwen txt2img with Ligthing Lora and Upscaler.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: vae
    name: qwen_image_vae.safetensors
    target_folder: models/vae
  - type: upscale_model
    name: 4x_NMKD-Siax_200k.pth
    target_folder: models/upscale_models
  - type: clip
    name: qwen_2.5_vl_7b_fp8_scaled.safetensors
    target_folder: models/clip
  - type: diffusion_model
    name: qwen-image-Q8_0.gguf
    target_folder: models/diffusion_models
  custom_nodes:
  - ComfyUI-GGUF
  - comfyui-easy-use
  - controlaltai-nodes
  - rgthree-comfy
  links:
  - https://blog.comfy.org/p/qwen-image-in-comfyui-new-era-of
  - https://discord.com/invite/gggpkVgBf3
  - https://github.com/ModelTC/Qwen-Image-Lightning/
  - https://huggingface.co/Akumetsu971/SD_Anime_Futuristic_Armor/resolve/main/4x_NMKD-Siax_200k.pth?download=true
  - https://huggingface.co/Comfy-Org/Qwen-Image_ComfyUI/resolve/main/split_files/text_encoders/qwen_2.5_vl_7b_fp8_scaled.safetensors
  - https://huggingface.co/Comfy-Org/Qwen-Image_ComfyUI/resolve/main/split_files/vae/qwen_image_vae.safetensors
  - https://huggingface.co/Comfy-Org/Qwen-Image_ComfyUI/tree/main/split_files/text_encoders
  - https://huggingface.co/city96/Qwen-Image-gguf/resolve/main/qwen-image-Q8_0.gguf?download=true
  - https://huggingface.co/city96/Qwen-Image-gguf/tree/main
  - https://huggingface.co/lightx2v/Qwen-Image-Lightning/resolve/main/Qwen-Image-Lightning-4steps-V1.0.safetensors?download=true
  - https://huggingface.co/lightx2v/Qwen-Image-Lightning/tree/main
  - https://www.youtube.com/@pixaroma
  input_modalities:
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - flux
  - qwen
  - sd3
  - wan
  node_count: 25
  node_types:
  - CLIPLoader
  - CLIPTextEncode
  - ConditioningZeroOut
  - EmptySD3LatentImage
  - Fast Groups Muter (rgthree)
  - FluxResolutionNode
  - ImageScaleBy
  - ImageUpscaleWithModel
  - KSampler
  - Label (rgthree)
  - MarkdownNote
  - ModelSamplingAuraFlow
  - Power Lora Loader (rgthree)
  - SaveImage
  - UnetLoaderGGUF
  - UpscaleModelLoader
  - VAEDecode
  - VAEEncode
  - VAELoader
  - easy cleanGpuUsed
  - easy showAnything
selection_metadata:
  family: upscaling
  resource_profile: high
  complexity_score: 6
  estimated_runtime: slow (often 2-6 min depending on model/server load)
  warnings:
  - Large model(s) detected; ensure enough VRAM and disk space.
  - Medium-high resolution detected; expect moderate extra runtime.
  - Multiple custom nodes required; verify node installation/version compatibility.
  max_width: 1024
  max_height: 1024
  max_steps: 4
