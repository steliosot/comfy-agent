name: workflow_ep46_flux_dev_txt2img_with_upscaler
description: Workflow wrapper for EP46 Flux Dev TXT2IMG with Upscaler.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: clip
    name: t5-v1_1-xxl-encoder-Q8_0.gguf
    target_folder: models/clip
  - type: diffusion_model
    name: flux1-dev-Q8_0.gguf
    target_folder: models/diffusion_models
  - type: upscale_model
    name: 4x_NMKD-Siax_200k.pth
    target_folder: models/upscale_models
  - type: vae
    name: ae.safetensors
    target_folder: models/vae
  custom_nodes:
  - ComfyUI-TiledDiffusion
  - comfyui-easy-use
  - comfyui-gguf
  - controlaltai-nodes
  links:
  - https://discord.com/invite/gggpkVgBf3
  - https://huggingface.co/Akumetsu971/SD_Anime_Futuristic_Armor/resolve/main/4x_NMKD-Siax_200k.pth?download=true
  - https://huggingface.co/black-forest-labs/FLUX.1-schnell
  - https://huggingface.co/black-forest-labs/FLUX.1-schnell/resolve/main/ae.safetensors?download=true
  - https://huggingface.co/city96/FLUX.1-dev-gguf/resolve/main/flux1-dev-Q8_0.gguf?download=true
  - https://huggingface.co/city96/FLUX.1-dev-gguf/tree/main
  - https://huggingface.co/city96/t5-v1_1-xxl-encoder-gguf/resolve/main/t5-v1_1-xxl-encoder-Q8_0.gguf?download=true
  - https://huggingface.co/city96/t5-v1_1-xxl-encoder-gguf/tree/main
  - https://huggingface.co/comfyanonymous/flux_text_encoders/resolve/main/clip_l.safetensors?download=true
  - https://www.youtube.com/@pixaroma
  input_modalities:
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - flux
  - sd3
  - wan
  node_count: 32
  node_types:
  - CLIPTextEncode
  - DualCLIPLoaderGGUF
  - EmptySD3LatentImage
  - Fast Groups Muter (rgthree)
  - FluxGuidance
  - FluxResolutionNode
  - ImageScaleBy
  - ImageUpscaleWithModel
  - KSampler
  - Label (rgthree)
  - MarkdownNote
  - SaveImage
  - TiledDiffusion
  - UnetLoaderGGUF
  - UpscaleModelLoader
  - VAEDecode
  - VAEEncode
  - VAELoader
  - easy cleanGpuUsed
  - easy showAnything
selection_metadata:
  family: upscaling
  resource_profile: high
  complexity_score: 7
  estimated_runtime: slow (often 2-6 min depending on model/server load)
  warnings:
  - Large model(s) detected; ensure enough VRAM and disk space.
  - Medium-high resolution detected; expect moderate extra runtime.
  - Multiple custom nodes required; verify node installation/version compatibility.
  max_width: 1024
  max_height: 1024
  max_steps: 30
