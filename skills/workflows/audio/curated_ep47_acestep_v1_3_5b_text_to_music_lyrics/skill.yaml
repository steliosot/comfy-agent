name: curated_ep47_acestep_v1_3_5b_text_to_music_lyrics
description: Curated workflow wrapper for EP47 AceStep V1 3.5b text to music - Lyrics.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: checkpoint
    name: ace_step_v1_3.5b.safetensors
    target_folder: models/checkpoints
  custom_nodes: []
  links:
  - https://discord.com/invite/gggpkVgBf3
  - https://docs.comfy.org/tutorials/audio/ace-step/ace-step-v1
  - https://docs.comfy.org/tutorials/audio/ace-step/ace-step-v1#multilingual-support
  - https://github.com/ace-step/ACE-Step
  - https://huggingface.co/ACE-Step/ACE-Step-v1-3.5B
  - https://huggingface.co/Comfy-Org/ACE-Step_ComfyUI_repackaged/resolve/main/all_in_one/ace_step_v1_3.5b.safetensors?download=true
  - https://www.youtube.com/@pixaroma
  input_modalities:
  - text_prompt
  output_modalities:
  - audio/wav
  model_families:
  - sd3
  node_count: 10
  node_types:
  - CheckpointLoaderSimple
  - ConditioningZeroOut
  - EmptyAceStepLatentAudio
  - KSampler
  - MarkdownNote
  - ModelSamplingSD3
  - Note
  - SaveAudio
  - TextEncodeAceStepAudio
  - VAEDecodeAudio
selection_metadata:
  family: audio
  resource_profile: medium
  complexity_score: 4
  estimated_runtime: moderate (about 30-120s depending on server)
  warnings:
  - Audio generation may take longer on CPU-only or low-VRAM servers.
  - Moderate-high sampler steps detected (>=40); runtime may be longer.
  max_width: null
  max_height: null
  max_steps: 50
