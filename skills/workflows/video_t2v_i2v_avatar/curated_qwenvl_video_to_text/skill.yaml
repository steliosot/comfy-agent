name: curated_qwenvl_video_to_text
description: Curated workflow wrapper for QwenVL Video to Text.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models: []
  custom_nodes:
  - comfyui-qwenvl
  - comfyui-videohelpersuite
  links:
  - https://discord.com/invite/gggpkVgBf3
  - https://github.com/1038lab/ComfyUI-QwenVL
  - https://www.youtube.com/@pixaroma
  input_modalities:
  - video
  output_modalities:
  - application/json
  model_families:
  - qwen
  - wan
  node_count: 5
  node_types:
  - AILab_QwenVL
  - Label (rgthree)
  - MarkdownNote
  - PreviewAny
  - VHS_LoadVideo
selection_metadata:
  family: video_t2v_i2v_avatar
  resource_profile: medium
  complexity_score: 5
  estimated_runtime: moderate (about 30-120s depending on server)
  warnings:
  - Uses custom nodes; missing nodes can cause validation/runtime failures.
  - 'Video workflow: usually slower and VRAM-intensive than still-image workflows.'
  max_width: null
  max_height: null
  max_steps: null
