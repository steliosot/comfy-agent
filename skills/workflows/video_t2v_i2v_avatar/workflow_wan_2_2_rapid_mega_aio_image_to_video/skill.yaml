name: workflow_wan_2_2_rapid_mega_aio_image_to_video
description: Workflow wrapper for Wan 2.2 Rapid Mega AIO Image to Video.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: checkpoint
    name: wan2.2-rapid-mega-aio-v8.safetensors
    target_folder: models/checkpoints
  custom_nodes:
  - ComfyUI-WanVideoWrapper
  - comfyui-videohelpersuite
  links:
  - https://discord.com/invite/gggpkVgBf3
  - https://huggingface.co/Phr00t/WAN2.2-14B-Rapid-AllInOne/resolve/main/Mega-v8/wan2.2-rapid-mega-aio-v8.safetensors?download=true
  - https://huggingface.co/Phr00t/WAN2.2-14B-Rapid-AllInOne/tree/main
  - https://huggingface.co/Phr00t/WAN2.2-14B-Rapid-AllInOne/tree/main/Mega-v8
  - https://www.youtube.com/@pixaroma
  input_modalities:
  - image
  - text_prompt
  output_modalities:
  - video/mp4
  model_families:
  - sd3
  - wan
  node_count: 16
  node_types:
  - CLIPTextEncode
  - CheckpointLoaderSimple
  - KSampler
  - Label (rgthree)
  - LoadImage
  - MarkdownNote
  - ModelSamplingSD3
  - PrimitiveNode
  - VAEDecode
  - VHS_VideoCombine
  - WanVaceToVideo
  - WanVideoVACEStartToEndFrame
selection_metadata:
  family: video_t2v_i2v_avatar
  resource_profile: medium
  complexity_score: 5
  estimated_runtime: moderate (about 30-120s depending on server)
  warnings:
  - Uses custom nodes; missing nodes can cause validation/runtime failures.
  - 'Video workflow: usually slower and VRAM-intensive than still-image workflows.'
  max_width: null
  max_height: null
  max_steps: 4
