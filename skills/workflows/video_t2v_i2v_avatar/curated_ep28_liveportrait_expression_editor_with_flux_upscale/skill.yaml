name: curated_ep28_liveportrait_expression_editor_with_flux_upscale
description: Curated workflow wrapper for Ep28 LivePortrait Expression Editor with
  Flux Upscale.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: clip
    name: t5-v1_1-xxl-encoder-Q8_0.gguf
    target_folder: models/clip
  - type: diffusion_model
    name: flux1-dev-Q8_0.gguf
    target_folder: models/diffusion_models
  - type: vae
    name: ae.safetensors
    target_folder: models/vae
  - type: upscale_model
    name: 4x_NMKD-Siax_200k.pth
    target_folder: models/upscale_models
  custom_nodes: []
  links: []
  input_modalities:
  - image
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - flux
  node_count: 27
  node_types:
  - CLIPTextEncode
  - DualCLIPLoaderGGUF
  - ExpressionEditor
  - Fast Groups Muter (rgthree)
  - FluxGuidance
  - Image Comparer (rgthree)
  - ImageScaleBy
  - ImageUpscaleWithModel
  - KSampler
  - Label (rgthree)
  - LoadImage
  - PreviewImage
  - SaveImage
  - UnetLoaderGGUF
  - UpscaleModelLoader
  - VAEDecode
  - VAEEncode
  - VAELoader
  - easy imageScaleDownToSize
selection_metadata:
  family: video_t2v_i2v_avatar
  resource_profile: high
  complexity_score: 7
  estimated_runtime: slow (often 2-6 min depending on model/server load)
  warnings:
  - Large model(s) detected; ensure enough VRAM and disk space.
  - 'Video workflow: usually slower and VRAM-intensive than still-image workflows.'
  max_width: null
  max_height: null
  max_steps: 20
