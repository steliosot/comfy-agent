  - type: controlnet
    name: diffusion_pytorch_model_promax.safetensors
    target_folder: models/controlnet
  - type: clip
    name: t5-v1_1-xxl-encoder-Q8_0.gguf
    target_folder: models/clip
  - type: diffusion_model
    name: flux1-dev-Q8_0.gguf
    target_folder: models/diffusion_models
  - type: vae
    name: ae.safetensors
    target_folder: models/vae
  - type: checkpoint
    name: wildcardxXLANIMATION_wildcardxXLANIMATION.safetensors
    target_folder: models/checkpoints
  custom_nodes: []
  links:
  - https://civitai.com/models/297501?modelVersionId=357959
  input_modalities:
  - image
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - flux
  - wan
  node_count: 43
  node_types:
  - AIO_Preprocessor
  - CLIPTextEncode
  - CheckpointLoaderSimple
  - ControlNetApplyAdvanced
  - ControlNetLoader
  - DualCLIPLoaderGGUF
  - FluxGuidance
  - FluxResolutionNode
  - Image Comparer (rgthree)
  - Image Resize
  - KSampler
  - Label (rgthree)
  - LoadImage
  - Note
  - PreviewImage
  - SaveImage
  - Text Concatenate
  - UnetLoaderGGUF
  - VAEDecode
  - VAEEncode
  - VAELoader
  - easy positive
  - easy showAnything
selection_metadata:
  family: img2img_inpaint_outpaint
  resource_profile: medium
  complexity_score: 4
  estimated_runtime: moderate (about 30-120s depending on server)
  warnings:
  - Large model(s) detected; ensure enough VRAM and disk space.
  max_width: null
  max_height: null
  max_steps: 30
