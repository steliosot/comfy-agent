name: workflow_ep23_flux_fill_inpaint
description: Workflow wrapper for EP23 Flux Fill Inpaint.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: diffusion_model
    name: flux1-fill-dev.safetensors
    target_folder: models/diffusion_models
  - type: vae
    name: ae.safetensors
    target_folder: models/vae
  custom_nodes: []
  links: []
  input_modalities:
  - image
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - flux
  node_count: 12
  node_types:
  - CLIPTextEncode
  - DifferentialDiffusion
  - DualCLIPLoader
  - FluxGuidance
  - InpaintModelConditioning
  - KSampler
  - LoadImage
  - SaveImage
  - UNETLoader
  - VAEDecode
  - VAELoader
selection_metadata:
  family: img2img_inpaint_outpaint
  resource_profile: low
  complexity_score: 0
  estimated_runtime: fast (usually under 30s on modern GPU)
  warnings: []
  max_width: null
  max_height: null
  max_steps: 20
