name: workflow_ep04_basic_sdxl_img2img_lora_workflow
description: Workflow wrapper for EP04 Basic SDXL IMG2IMG LORA Workflow.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: checkpoint
    name: Juggernaut_X_RunDiffusion.safetensors
    target_folder: models/checkpoints
  - type: lora
    name: Aether_Fire_v1_SDXL_LoRA.safetensors
    target_folder: models/loras
  custom_nodes: []
  links: []
  input_modalities:
  - image
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - sdxl
  node_count: 10
  node_types:
  - CLIPTextEncode
  - CheckpointLoaderSimple
  - ImageScale
  - KSampler
  - LoadImage
  - LoraLoader
  - SaveImage
  - VAEDecode
  - VAEEncode
selection_metadata:
  family: img2img_inpaint_outpaint
  resource_profile: low
  complexity_score: 0
  estimated_runtime: fast (usually under 30s on modern GPU)
  warnings: []
  max_width: null
  max_height: null
  max_steps: 30
