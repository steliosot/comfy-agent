  - https://civitai.com/models/297501?modelVersionId=357959
  input_modalities:
  - image
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - flux
  - wan
  node_count: 28
  node_types:
  - AIO_Preprocessor
  - CLIPTextEncode
  - CheckpointLoaderSimple
  - ControlNetApplyAdvanced
  - ControlNetLoader
  - FluxResolutionNode
  - Image Comparer (rgthree)
  - Image Resize
  - KSampler
  - Label (rgthree)
  - LoadImage
  - Note
  - PreviewImage
  - SaveImage
  - Text Concatenate
  - VAEDecode
  - VAEEncode
  - easy positive
  - easy showAnything
selection_metadata:
  family: img2img_inpaint_outpaint
  resource_profile: low
  complexity_score: 2
  estimated_runtime: fast (usually under 30s on modern GPU)
  warnings:
  - Large model(s) detected; ensure enough VRAM and disk space.
  max_width: null
  max_height: null
  max_steps: 30
