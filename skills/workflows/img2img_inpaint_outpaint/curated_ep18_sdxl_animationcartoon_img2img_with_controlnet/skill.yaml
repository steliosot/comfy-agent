  - type: controlnet
    name: diffusion_pytorch_model_promax.safetensors
    target_folder: models/controlnet
  - type: checkpoint
    name: wildcardxXLANIMATION_wildcardxXLANIMATION.safetensors
    target_folder: models/checkpoints
  custom_nodes: []
