name: workflow_ep17_flux_1_dev_gguf_img2img_with_ghibsky_lora
description: Workflow wrapper for EP17 Flux 1 Dev GGUF IMG2IMG with Ghibsky Lora.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: diffusion_model
    name: flux1-dev-Q8_0.gguf
    target_folder: models/diffusion_models
  - type: clip
    name: t5-v1_1-xxl-encoder-Q8_0.gguf
    target_folder: models/clip
  - type: vae
    name: ae.safetensors
    target_folder: models/vae
  custom_nodes: []
  links: []
  input_modalities:
  - image
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - flux
  node_count: 13
  node_types:
  - CLIPTextEncode
  - DualCLIPLoaderGGUF
  - FluxGuidance
  - KSampler
  - LoadImage
  - Power Lora Loader (rgthree)
  - SaveImage
  - UnetLoaderGGUF
  - VAEDecode
  - VAEEncode
  - VAELoader
  - easy imageScaleDownToSize
selection_metadata:
  family: img2img_inpaint_outpaint
  resource_profile: medium
  complexity_score: 3
  estimated_runtime: moderate (about 30-120s depending on server)
  warnings:
  - Large model(s) detected; ensure enough VRAM and disk space.
  max_width: null
  max_height: null
  max_steps: 20
