name: curated_nunchaku_qwen_lightning_outpainting_a_folder_of_images
description: Curated workflow wrapper for Nunchaku Qwen Lightning - Outpainting a
  Folder of Images.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: clip
    name: qwen_2.5_vl_7b_fp8_scaled.safetensors
    target_folder: models/clip
  - type: vae
    name: qwen_image_vae.safetensors
    target_folder: models/vae
  - type: controlnet
    name: Qwen-Image-InstantX-ControlNet-Inpainting.safetensors
    target_folder: models/controlnet
  custom_nodes:
  - comfyui-easy-use
  - comfyui-itools
  - comfyui-nunchaku
  - rgthree-comfy
  links:
  - https://discord.com/invite/gggpkVgBf3
  - https://github.com/Tavris1/ComfyUI-Easy-Install
  - https://github.com/nunchaku-tech/ComfyUI-nunchaku
  - https://huggingface.co/Comfy-Org/Qwen-Image-InstantX-ControlNets/resolve/main/split_files/controlnet/Qwen-Image-InstantX-ControlNet-Inpainting.safetensors?download=true
  - https://huggingface.co/Comfy-Org/Qwen-Image_ComfyUI/resolve/main/split_files/text_encoders/qwen_2.5_vl_7b_fp8_scaled.safetensors
  - https://huggingface.co/Comfy-Org/Qwen-Image_ComfyUI/resolve/main/split_files/vae/qwen_image_vae.safetensors
  - https://huggingface.co/Comfy-Org/Qwen-Image_ComfyUI/tree/main/split_files/text_encoders
  - https://huggingface.co/nunchaku-tech/nunchaku-qwen-image/resolve/main/svdq-int4_r32-qwen-image-lightningv1.1-8steps.safetensors?download=true
  - https://huggingface.co/nunchaku-tech/nunchaku-qwen-image/tree/main
  - https://www.youtube.com/@pixaroma
  input_modalities:
  - image
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - qwen
  node_count: 21
  node_types:
  - CLIPLoader
  - CLIPTextEncode
  - ConditioningZeroOut
  - ControlNetInpaintingAliMamaApply
  - ControlNetLoader
  - Image Comparer (rgthree)
  - ImagePadForOutpaint
  - KSampler
  - Label (rgthree)
  - MarkdownNote
  - ModelSamplingAuraFlow
  - NunchakuQwenImageDiTLoader
  - PreviewImage
  - SaveImage
  - VAEDecode
  - VAEEncode
  - VAELoader
  - easy imageScaleDownToSize
  - iToolsLoadImages
selection_metadata:
  family: img2img_inpaint_outpaint
  resource_profile: low
  complexity_score: 2
  estimated_runtime: fast (usually under 30s on modern GPU)
  warnings:
  - Multiple custom nodes required; verify node installation/version compatibility.
  max_width: null
  max_height: null
  max_steps: 8
