name: curated_ep13_sdxl_txt2img_with_prompt_from_image
description: Curated workflow wrapper for EP13 SDXL TXT2IMG with Prompt from Image.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: checkpoint
    name: Juggernaut_X_RunDiffusion.safetensors
    target_folder: models/checkpoints
  custom_nodes: []
  links:
  - http://127.0.0.1:11434
  - https://ollama.com/benzie/llava-phi-3
  - https://ollama.com/library/llava
  input_modalities:
  - image
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - wan
  node_count: 11
  node_types:
  - CLIPTextEncode
  - CheckpointLoaderSimple
  - EmptyLatentImage
  - KSampler
  - LoadImage
  - Note
  - OllamaVision
  - SaveImage
  - VAEDecode
  - easy showAnything
selection_metadata:
  family: txt2img
  resource_profile: low
  complexity_score: 2
  estimated_runtime: fast (usually under 30s on modern GPU)
  warnings:
  - Medium-high resolution detected; expect moderate extra runtime.
  max_width: 1024
  max_height: 1024
  max_steps: 30
