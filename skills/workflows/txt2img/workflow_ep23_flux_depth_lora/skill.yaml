name: workflow_ep23_flux_depth_lora
description: Workflow wrapper for EP23 Flux Depth Lora.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: diffusion_model
    name: flux1-dev-Q8_0.gguf
    target_folder: models/diffusion_models
  - type: clip
    name: clip_l.safetensors
    target_folder: models/clip
  - type: vae
    name: ae.safetensors
    target_folder: models/vae
  custom_nodes: []
  links: []
  input_modalities:
  - image
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - flux
  node_count: 14
  node_types:
  - AIO_Preprocessor
  - CLIPTextEncode
  - DualCLIPLoaderGGUF
  - FluxGuidance
  - InstructPixToPixConditioning
  - KSampler
  - LoadImage
  - Power Lora Loader (rgthree)
  - PreviewImage
  - SaveImage
  - UnetLoaderGGUF
  - VAEDecode
  - VAELoader
selection_metadata:
  family: txt2img
  resource_profile: low
  complexity_score: 2
  estimated_runtime: fast (usually under 30s on modern GPU)
  warnings:
  - Large model(s) detected; ensure enough VRAM and disk space.
  max_width: null
  max_height: null
  max_steps: 30
