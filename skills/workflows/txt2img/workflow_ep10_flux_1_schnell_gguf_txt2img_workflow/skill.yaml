name: workflow_ep10_flux_1_schnell_gguf_txt2img_workflow
description: Workflow wrapper for EP10 Flux 1 Schnell GGUF TXT2IMG Workflow.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: vae
    name: ae.safetensors
    target_folder: models/vae
  - type: clip
    name: t5-v1_1-xxl-encoder-Q8_0.gguf
    target_folder: models/clip
  - type: diffusion_model
    name: flux1-schnell-Q8_0.gguf
    target_folder: models/diffusion_models
  custom_nodes: []
  links: []
  input_modalities:
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - flux
  - sd3
  node_count: 9
  node_types:
  - CLIPTextEncode
  - DualCLIPLoaderGGUF
  - EmptySD3LatentImage
  - KSampler
  - SaveImage
  - UnetLoaderGGUF
  - VAEDecode
  - VAELoader
selection_metadata:
  family: txt2img
  resource_profile: medium
  complexity_score: 5
  estimated_runtime: moderate (about 30-120s depending on server)
  warnings:
  - Large model(s) detected; ensure enough VRAM and disk space.
  - Medium-high resolution detected; expect moderate extra runtime.
  max_width: 1024
  max_height: 1024
  max_steps: 4
