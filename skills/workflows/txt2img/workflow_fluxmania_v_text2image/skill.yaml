name: workflow_fluxmania_v_text2image
description: Workflow wrapper for Fluxmania V - Text2Image.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: vae
    name: ae.safetensors
    target_folder: models/vae
  - type: diffusion_model
    name: fluxmania_V.safetensors
    target_folder: models/diffusion_models
  custom_nodes:
  - comfyui-easy-use
  links:
  - https://civitai.com/api/download/models/1377767?type=Model&format=SafeTensor&size=full&fp=fp32
  - https://civitai.com/api/download/models/1539776?type=Model&format=SafeTensor&size=full&fp=fp8
  - https://civitai.com/models/778691/fluxmania?modelVersionId=1539776
  - https://discord.com/invite/gggpkVgBf3
  - https://huggingface.co/black-forest-labs/FLUX.1-schnell/resolve/main/ae.safetensors?download=true
  - https://huggingface.co/comfyanonymous/flux_text_encoders/resolve/main/t5xxl_fp8_e4m3fn_scaled.safetensors?download=true
  - https://www.youtube.com/@pixaroma
  input_modalities:
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - flux
  - sd3
  node_count: 12
  node_types:
  - CLIPTextEncode
  - DualCLIPLoader
  - EmptySD3LatentImage
  - FluxGuidance
  - KSampler
  - MarkdownNote
  - SaveImage
  - UNETLoader
  - VAEDecode
  - VAELoader
  - easy cleanGpuUsed
selection_metadata:
  family: txt2img
  resource_profile: medium
  complexity_score: 3
  estimated_runtime: moderate (about 30-120s depending on server)
  warnings:
  - Medium-high resolution detected; expect moderate extra runtime.
  - Uses custom nodes; missing nodes can cause validation/runtime failures.
  max_width: 1024
  max_height: 1024
  max_steps: 30
