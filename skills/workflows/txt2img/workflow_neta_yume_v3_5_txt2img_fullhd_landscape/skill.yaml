name: workflow_neta_yume_v3_5_txt2img_fullhd_landscape
description: Workflow wrapper for Neta Yume v3.5 txt2img - FullHD Landscape.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: checkpoint
    name: NetaYumev35_pretrained_all_in_one.safetensors
    target_folder: models/checkpoints
  custom_nodes: []
  links:
  - https://discord.com/invite/gggpkVgBf3
  - https://huggingface.co/duongve/NetaYume-Lumina-Image-2.0
  - https://huggingface.co/duongve/NetaYume-Lumina-Image-2.0/resolve/main/NetaYumev35_pretrained_all_in_one.safetensors
  - https://neta-lumina-style.tz03.xyz/
  - https://nieta-art.feishu.cn/wiki/RY3GwpT59icIQlkWXEfcCqIMnQd
  - https://www.youtube.com/@pixaroma
  input_modalities:
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - sd3
  node_count: 12
  node_types:
  - CLIPTextEncode
  - CheckpointLoaderSimple
  - EmptySD3LatentImage
  - ImageCrop
  - KSampler
  - Label (rgthree)
  - MarkdownNote
  - ModelSamplingAuraFlow
  - SaveImage
  - StringConcatenate
  - VAEDecode
selection_metadata:
  family: txt2img
  resource_profile: medium
  complexity_score: 3
  estimated_runtime: moderate (about 30-120s depending on server)
  warnings:
  - High output resolution detected; generation time/memory use can increase significantly.
  max_width: 1920
  max_height: 1088
  max_steps: 30
