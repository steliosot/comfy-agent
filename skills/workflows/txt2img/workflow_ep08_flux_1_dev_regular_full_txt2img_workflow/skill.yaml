name: workflow_ep08_flux_1_dev_regular_full_txt2img_workflow
description: Workflow wrapper for EP08 Flux 1 Dev Regular Full TXT2IMG Workflow.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: diffusion_model
    name: flux1-dev.safetensors
    target_folder: models/diffusion_models
  - type: vae
    name: ae.safetensors
    target_folder: models/vae
  custom_nodes: []
  links:
  - https://comfyanonymous.github.io/ComfyUI_examples/flux/
  input_modalities:
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - flux
  - sd3
  node_count: 18
  node_types:
  - BasicGuider
  - BasicScheduler
  - CLIPTextEncode
  - DualCLIPLoader
  - EmptySD3LatentImage
  - FluxGuidance
  - KSamplerSelect
  - ModelSamplingFlux
  - Note
  - PrimitiveNode
  - RandomNoise
  - SamplerCustomAdvanced
  - SaveImage
  - UNETLoader
  - VAEDecode
  - VAELoader
selection_metadata:
  family: txt2img
  resource_profile: low
  complexity_score: 2
  estimated_runtime: fast (usually under 30s on modern GPU)
  warnings:
  - Medium-high resolution detected; expect moderate extra runtime.
  max_width: 1024
  max_height: 1024
  max_steps: null
