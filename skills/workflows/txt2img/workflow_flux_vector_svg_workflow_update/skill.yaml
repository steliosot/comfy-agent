name: workflow_flux_vector_svg_workflow_update
description: Workflow wrapper for Flux Vector SVG Workflow Update.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: diffusion_model
    name: flux1-dev-Q8_0.gguf
    target_folder: models/diffusion_models
  - type: vae
    name: ae.safetensors
    target_folder: models/vae
  - type: clip
    name: t5-v1_1-xxl-encoder-Q8_0.gguf
    target_folder: models/clip
  custom_nodes:
  - ComfyUI-GGUF
  - comfyui-tosvg
  links: []
  input_modalities:
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - flux
  - sd3
  node_count: 29
  node_types:
  - CLIPTextEncode
  - DualCLIPLoaderGGUF
  - EmptySD3LatentImage
  - Fast Groups Muter (rgthree)
  - FluxGuidance
  - KSampler
  - Label (rgthree)
  - SaveImage
  - TS_ImageQuantize
  - TS_ImageToSVGStringBW_Vtracer
  - TS_ImageToSVGStringColor_Vtracer
  - TS_SVGBytesIOToString
  - TS_SVGStringToImage
  - TS_SVGStringToSVGBytesIO
  - TS_SaveSVGString
  - UnetLoaderGGUF
  - VAEDecode
  - VAELoader
selection_metadata:
  family: txt2img
  resource_profile: high
  complexity_score: 6
  estimated_runtime: slow (often 2-6 min depending on model/server load)
  warnings:
  - Large model(s) detected; ensure enough VRAM and disk space.
  - Medium-high resolution detected; expect moderate extra runtime.
  - Uses custom nodes; missing nodes can cause validation/runtime failures.
  max_width: 1024
  max_height: 1024
  max_steps: 30
