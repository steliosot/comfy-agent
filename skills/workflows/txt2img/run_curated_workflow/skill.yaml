name: run_curated_workflow
description: Execute a curated workflow skill by id with optional runtime overrides.
inputs:
  skill_id:
    type: string
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models: []
  custom_nodes: []
  links: []
  input_modalities:
  - text_prompt
  output_modalities:
  - application/json
  model_families:
  - other
  node_count: null
  node_types: []
selection_metadata:
  family: txt2img
  resource_profile: unknown
  complexity_score: null
  estimated_runtime: depends on runtime parameters and server resources
  warnings:
  - Hand-authored skill (no embedded workflow.json); metadata is inferred and may
    be approximate.
  max_width: null
  max_height: null
  max_steps: null
