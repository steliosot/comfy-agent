name: workflow_ep20_flux_dev_q8_sketch_2_image
description: Workflow wrapper for EP20 Flux Dev Q8 Sketch 2 Image.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: diffusion_model
    name: flux1-dev-Q8_0.gguf
    target_folder: models/diffusion_models
  - type: clip
    name: t5-v1_1-xxl-encoder-Q8_0.gguf
    target_folder: models/clip
  - type: vae
    name: ae.safetensors
    target_folder: models/vae
  - type: controlnet
    name: flux-dev-controlnet-union.safetensors
    target_folder: models/controlnet
  custom_nodes: []
  links: []
  input_modalities:
  - image
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - flux
  - sd3
  - wan
  node_count: 85
  node_types:
  - AIO_Preprocessor
  - CLIPTextEncode
  - Canvas_Tab
  - ControlNetApplyAdvanced
  - ControlNetLoader
  - DualCLIPLoaderGGUF
  - EmptySD3LatentImage
  - Fast Groups Muter (rgthree)
  - FluxGuidance
  - FluxResolutionNode
  - Image Comparer (rgthree)
  - Image Filter Adjustments
  - Image Resize
  - ImageScale
  - KSampler
  - Label (rgthree)
  - LoadImage
  - Note
  - PreviewImage
  - SaveImage
  - UnetLoaderGGUF
  - VAEDecode
  - VAEEncode
  - VAELoader
  - easy showAnything
selection_metadata:
  family: txt2img
  resource_profile: medium
  complexity_score: 5
  estimated_runtime: moderate (about 30-120s depending on server)
  warnings:
  - Large model(s) detected; ensure enough VRAM and disk space.
  - Medium-high resolution detected; expect moderate extra runtime.
  max_width: 1024
  max_height: 1024
  max_steps: 20
