name: curated_ep20_sdxl_sketch_2_image
description: Curated workflow wrapper for EP20 SDXL Sketch 2 Image.json
inputs:
  prompt:
    type: string
    required: false
  negative_prompt:
    type: string
    required: false
  width:
    type: integer
    required: false
  height:
    type: integer
    required: false
  seed:
    type: integer
    required: false
  steps:
    type: integer
    required: false
  cfg:
    type: number
    required: false
  sampler_name:
    type: string
    required: false
  scheduler:
    type: string
    required: false
  denoise:
    type: number
    required: false
  server:
    type: string
    required: false
  headers:
    type: object
    required: false
  api_prefix:
    type: string
    required: false
outputs:
  status:
    type: string
  prompt_id:
    type: string
  output_images:
    type: array
requirements:
  models:
  - type: checkpoint
    name: Juggernaut_X_RunDiffusion.safetensors
    target_folder: models/checkpoints
  - type: controlnet
    name: diffusion_pytorch_model_promax.safetensors
    target_folder: models/controlnet
  custom_nodes: []
  links: []
  input_modalities:
  - image
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - flux
  - sd3
  - wan
  node_count: 75
  node_types:
  - AIO_Preprocessor
  - CLIPTextEncode
  - Canvas_Tab
  - CheckpointLoaderSimple
  - ControlNetApplyAdvanced
  - ControlNetLoader
  - EmptySD3LatentImage
  - Fast Groups Muter (rgthree)
  - FluxResolutionNode
  - Image Comparer (rgthree)
  - Image Filter Adjustments
  - Image Resize
  - ImageScale
  - KSampler
  - Label (rgthree)
  - LoadImage
  - Note
  - PreviewImage
  - SaveImage
  - VAEDecode
  - VAEEncode
  - easy showAnything
selection_metadata:
  family: txt2img
  resource_profile: low
  complexity_score: 2
  estimated_runtime: fast (usually under 30s on modern GPU)
  warnings:
  - Medium-high resolution detected; expect moderate extra runtime.
  max_width: 1024
  max_height: 1024
  max_steps: 30
