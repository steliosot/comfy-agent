  input_modalities:
  - text_prompt
  output_modalities:
  - image/png
  model_families:
  - sd3
  node_count: 11
  node_types:
  - CLIPTextEncode
  - EmptySD3LatentImage
  - KSampler
  - MarkdownNote
  - ModelSamplingSD3
  - QuadrupleCLIPLoader
  - SaveImage
  - UnetLoaderGGUF
  - VAEDecode
  - VAELoader
selection_metadata:
  family: txt2img
  resource_profile: medium
  complexity_score: 5
  estimated_runtime: moderate (about 30-120s depending on server)
  warnings:
  - Large model(s) detected; ensure enough VRAM and disk space.
  - Medium-high resolution detected; expect moderate extra runtime.
  - Uses custom nodes; missing nodes can cause validation/runtime failures.
  max_width: 1024
  max_height: 1024
  max_steps: 28
