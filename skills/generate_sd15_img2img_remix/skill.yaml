name: generate_sd15_img2img_remix
description: Remix an input image with SD1.5 img2img.

inputs:
  image:
    type: string
    default: "remix_source.png"
  prompt:
    type: string
    default: "cinematic sci-fi repaint of the source image"
  negative_prompt:
    type: string
    default: "watermark, text, blurry, low quality, artifacts"
  steps:
    type: integer
    default: 28
  denoise:
    type: float
    default: 0.55
  seed:
    type: integer
    default: 56120499810023

outputs:
  image: string
