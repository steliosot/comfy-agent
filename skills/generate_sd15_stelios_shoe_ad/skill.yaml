name: generate_sd15_stelios_shoe_ad
description: Generate an SD1.5 animated shoe advertisement for Stelios.

inputs:
  prompt:
    type: string
    default: "cinematic advertisement for luxury shoes called Stelios"
  negative_prompt:
    type: string
    default: "watermark, text, blurry, low quality, bad anatomy, extra limbs"
  width:
    type: integer
    default: 512
  height:
    type: integer
    default: 768
  batch_size:
    type: integer
    default: 60
  steps:
    type: integer
    default: 20
  fps:
    type: integer
    default: 6
  seed:
    type: integer
    default: 2026031701

outputs:
  animation: string
