name: optimization_memoization

description: Enable deterministic cache plus graph memoization.

inputs:
  cache_policy:
    type: string
    required: false
  cache_size:
    type: integer
    required: false
  max_models_in_vram:
    type: integer
    required: false
  enable_cpu_offload:
    type: boolean
    required: false
  lazy_loading:
    type: boolean
    required: false

outputs:
  status:
    type: string
  mode:
    type: string
  workflow:
    type: object
  model_manager:
    type: object
  python_snippet:
    type: string
